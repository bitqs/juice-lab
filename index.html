<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Juice Lab · 打击感实验室</title>
<meta name="description" content="一步一步感受打击感是怎么叠出来的 — 参数全部溯源自《吸血鬼幸存者》《Hades》反编译研究">
<link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <h1 id="title">⚔️ Juice Lab</h1>
  <p class="sub" id="subtitle"></p>
  <button id="auto-btn" class="btn-secondary"></button>
  <button id="lang-btn" class="btn-ghost">中文</button>
</header>

<main>
  <section id="stage">
    <canvas id="game" width="640" height="440"></canvas>
    <button id="ab-btn" class="btn-secondary"><span id="ab-label"></span><span id="ab-state"></span></button>
    <button id="ult-btn-dom" class="btn-primary" hidden>⚡ ULT</button>
    <button id="view-btn" class="btn-secondary">🎥</button>
  </section>

  <aside id="panel">
    <div id="step-card">
      <div id="card-head">
        <div id="step-tag">STEP 0</div>
        <span id="card-fold">▾</span>
      </div>
      <h2 id="step-name">裸命中</h2>
      <p id="step-desc">说明加载中…</p>
      <div id="step-params"></div>
      <div id="step-source"></div>
    </div>
    <div id="free-mode">
      <h3><span id="free-title"></span> <span class="hint" id="free-hint"></span></h3>
      <div id="toggles"></div>
    </div>
  </aside>
</main>

<nav id="stepper">
  <button id="prev" class="btn-ghost"></button>
  <div id="dots"></div>
  <button id="next" class="btn-secondary"></button>
  <button id="max-btn" class="btn-primary">⚡MAX</button>
</nav>

<div id="overload-row" hidden>
  <label><span id="overload-label"></span><span id="overload-val">1.0x</span></label>
  <input type="range" id="overload" min="1" max="5" step="0.5" value="1">
  <span class="warn" id="overload-warn"></span>
</div>

<footer>
  <button id="gif-btn" class="btn-ghost"></button>
  <a href="https://github.com/bitqs/juice-lab" target="_blank" rel="noopener">GitHub</a>
</footer>

<script type="module" src="js/main.js"></script>
</body>
</html>
